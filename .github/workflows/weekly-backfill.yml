name: weekly-backfill

on:
  schedule:
    - cron: "0 23 * * 0"
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: market-data-push
  cancel-in-progress: false

jobs:
  backfill:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run weekly backfill
        id: backfill
        continue-on-error: true
        env:
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
        run: |
          set -o pipefail
          python -m scripts.weekly_backfill 2>&1 | tee backfill_run.log

      - name: Commit & push
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/ logs/
          if git diff --cached --quiet; then
            echo "no changes"
            exit 0
          fi
          run_date="$(date -u +%Y-%m-%d)"
          summary_json="$(ls -1t logs/summary_*_backfill.json | head -n 1)"
          written="$(python -c "import json,sys; d=json.load(open(sys.argv[1])); print(d['written'])" "$summary_json")"
          git commit -m "backfill: ${run_date} weekly fill (${written} filled)"
          branch="${GITHUB_REF_NAME:-main}"
          for attempt in 1 2 3 4 5; do
            git fetch origin "$branch"
            if ! git rebase -X theirs "origin/$branch"; then
              echo "::warning::rebase に未解決の衝突 (attempt $attempt) — abort して再試行"
              git rebase --abort
              sleep $((attempt * 3))
              continue
            fi
            if git push origin "HEAD:$branch"; then
              echo "pushed on attempt $attempt"
              exit 0
            fi
            echo "::warning::push 拒否 — リモートが前進 (attempt $attempt) — 再同期"
            sleep $((attempt * 3))
          done
          echo "::error::5 回試行しても backfill を push できませんでした"
          exit 1

      - name: Surface backfill failure
        if: steps.backfill.outcome == 'failure'
        run: |
          echo "::error::weekly backfill failed — see traceback below (often a data-source outage, e.g. FRED HTTP 5xx)"
          echo "----- tail of backfill output -----"
          tail -n 50 backfill_run.log || true
          exit 1
