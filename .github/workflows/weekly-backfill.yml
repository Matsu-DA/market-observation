name: weekly-backfill

on:
  schedule:
    - cron: "0 23 * * 0"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  backfill:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run weekly backfill
        id: backfill
        continue-on-error: true
        env:
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
        run: |
          set -o pipefail
          python -m scripts.weekly_backfill 2>&1 | tee backfill_run.log

      - name: Commit & push
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/ logs/
          if git diff --cached --quiet; then
            echo "no changes"
            exit 0
          fi
          run_date="$(date -u +%Y-%m-%d)"
          summary_json="$(ls -1t logs/summary_*_backfill.json | head -n 1)"
          written="$(python -c "import json,sys; d=json.load(open(sys.argv[1])); print(d['written'])" "$summary_json")"
          git commit -m "backfill: ${run_date} weekly fill (${written} filled)"
          git pull --rebase origin "${GITHUB_REF_NAME:-main}"
          git push origin "HEAD:${GITHUB_REF_NAME:-main}"

      - name: Surface backfill failure
        if: steps.backfill.outcome == 'failure'
        run: |
          echo "::error::weekly backfill failed — see traceback below (often a data-source outage, e.g. FRED HTTP 5xx)"
          echo "----- tail of backfill output -----"
          tail -n 50 backfill_run.log || true
          exit 1
