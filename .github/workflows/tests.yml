name: tests

on:
  push:
    paths: ["scripts/**", "tests/**", "requirements*.txt"]
  pull_request:
    paths: ["scripts/**", "tests/**", "requirements*.txt"]
  workflow_dispatch: {}

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements-dev.txt

      - name: Run tests
        run: pytest -q
